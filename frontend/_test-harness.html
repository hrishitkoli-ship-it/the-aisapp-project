<!DOCTYPE html>
<!--
  _test-harness.html
  ------------------------------------------------------------------
  Session 3 lane. NOT part of the final app shell -- that's Session
  1's file. This exists so the Project Management UI (projects.js +
  projects.css) can be manually verified end-to-end against a real
  running backend without waiting on frontend/index.html to exist.

  Delete this file once Session 1's shell supersedes it, or leave it
  under a `_` prefix as a standing manual-test page -- either is fine,
  just don't wire app routing through it.

  Usage: npm start, then open this file's served path in a browser.
  ------------------------------------------------------------------
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Hub — Project Management (test harness)</title>
  <link rel="stylesheet" href="css/projects.css" />
  <style>
    body {
      margin: 0;
      background: var(--aisapp-bg);
      color: var(--aisapp-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      box-sizing: border-box;
    }
    #app { max-width: 480px; margin: 0 auto; }
    #event-log {
      margin-top: 24px;
      padding: 10px 14px;
      background: var(--aisapp-surface);
      border: 1px dashed var(--aisapp-border);
      border-radius: 10px;
      font-size: 0.75rem;
      color: var(--aisapp-text-dim);
      font-family: monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="event-log">projectselected events will log here…</div>

  <script src="js/projects.js"></script>
  <script>
    ProjectManager.init(document.getElementById('app'));

    // Prove the integration contract actually works: log every
    // projectselected event a Session-1 router would consume.
    const log = document.getElementById('event-log');
    document.addEventListener('projectselected', (e) => {
      log.textContent = `projectselected fired -> projectId: ${e.detail.projectId}\n` + log.textContent;
    });
  </script>
</body>
</html>
